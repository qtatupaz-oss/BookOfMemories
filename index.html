<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Book of Memories</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=EB+Garamond:ital,wght@0,400;1,400&family=Dancing+Script:wght@500;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#fdf8f0; --parchment:#f5e9d0; --paper:#fffdf7;
  --rose:#c97b84; --rose-l:#f2d0d4; --rose-d:#7a3d44;
  --gold:#b8915a; --gold-l:#e8d5a3; --gold-d:#7a5a2a;
  --ink:#2a1f1a; --ink-l:#6b4f45; --ink-ll:#a08070;
  --sage:#7a9e7e; --sage-l:#c8deca;
  --cover-l:#8e4a52; --cover-d:#5a1f28;
  --spine:#6b3038;
  --sh:rgba(42,31,26,0.13);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}

body {
  font-family:'Lato',sans-serif;
  background:radial-gradient(ellipse at 30% 20%,#3a2018 0%,#1a0e08 60%,#0d0805 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;
  overflow:hidden;
}

/* ─── BOOK SHELL ─── */
#bookWrap {
  perspective:2200px;
  display:flex;align-items:center;justify-content:center;
  width:100vw;height:100vh;
  position:relative;
}

#book {
  position:relative;
  width:min(900px,95vw);
  height:min(620px,90vh);
  display:flex;
  transform-style:preserve-3d;
  filter:drop-shadow(0 40px 80px rgba(0,0,0,0.7));
}

/* spine */
#book::before {
  content:'';
  position:absolute;
  left:50%;transform:translateX(-50%) rotateY(0deg);
  width:28px;height:100%;
  background:linear-gradient(180deg,var(--spine) 0%,#3a1218 40%,var(--spine) 100%);
  z-index:50;
  box-shadow:inset -3px 0 8px rgba(0,0,0,0.4),inset 3px 0 8px rgba(0,0,0,0.4);
}

/* ─── COVER ─── */
#cover {
  width:50%;height:100%;
  position:relative;
  background:linear-gradient(135deg,var(--cover-l) 0%,var(--cover-d) 100%);
  border-radius:4px 0 0 4px;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  gap:12px;
  cursor:pointer;
  z-index:10;
  transition:transform 0.05s;
}
#cover:hover { transform:translateX(-2px); }
#cover::before {
  content:'';position:absolute;inset:10px;
  border:1.5px solid rgba(255,255,255,0.18);
  border-radius:2px;pointer-events:none;
}
#cover::after {
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  pointer-events:none;opacity:0.5;
}
.cover-title {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.4rem,3.5vw,2.2rem);
  font-style:italic;
  color:rgba(255,255,255,0.92);
  text-align:center;
  line-height:1.3;
  z-index:1;
  text-shadow:0 2px 12px rgba(0,0,0,0.4);
  padding:0 24px;
}
.cover-heart {
  color:var(--rose-l);font-size:1.4rem;z-index:1;
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
.cover-subtitle {
  font-family:'Dancing Script',cursive;
  color:rgba(255,255,255,0.55);
  font-size:0.9rem;z-index:1;
  letter-spacing:0.08em;
}
.cover-open-hint {
  position:absolute;bottom:18px;
  font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(255,255,255,0.35);z-index:1;
  font-family:'Lato',sans-serif;
}

/* cover SVG rose */
.cover-rose { position:absolute;bottom:30px;right:20px;opacity:0.22;z-index:1;pointer-events:none; }
.cover-rose-tl { position:absolute;top:20px;left:16px;opacity:0.18;z-index:1;pointer-events:none;transform:rotate(180deg); }

/* ─── PAGES CONTAINER ─── */
#pagesArea {
  width:50%;height:100%;
  position:relative;
  background:var(--paper);
  border-radius:0 4px 4px 0;
  overflow:hidden;
  box-shadow:inset -6px 0 20px rgba(0,0,0,0.08),inset 6px 0 12px rgba(0,0,0,0.06);
}

/* page tabs on right edge */
#pageTabs {
  position:absolute;right:0;top:0;bottom:0;
  width:36px;
  display:flex;flex-direction:column;
  z-index:30;
  overflow:hidden;
}
.page-tab {
  flex:1;display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  background:var(--parchment);
  border-left:2px solid var(--gold-l);
  border-bottom:1px solid rgba(184,145,90,0.2);
  writing-mode:vertical-rl;
  font-family:'Dancing Script',cursive;
  font-size:0.65rem;
  color:var(--ink-ll);
  padding:4px 0;
  transition:background 0.2s,color 0.2s;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
  max-height:80px;
}
.page-tab:hover,.page-tab.active {
  background:var(--rose-l);color:var(--rose-d);
  border-left-color:var(--rose);
}
.page-tab.add-tab {
  background:rgba(184,145,90,0.12);
  color:var(--gold);
  font-size:1.1rem;
  writing-mode:horizontal-tb;
  font-family:'Lato',sans-serif;
  flex:0;height:36px;
  border-top:1px solid var(--gold-l);
}
.page-tab.add-tab:hover { background:var(--gold-l);color:var(--gold-d); }

/* ─── SINGLE PAGE ─── */
.scrap-page {
  position:absolute;inset:0;right:36px;
  overflow:hidden;
  display:none;
}
.scrap-page.active { display:block; }

/* paper texture lines */
.scrap-page::before {
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(transparent,transparent 27px,rgba(184,145,90,0.08) 28px);
  pointer-events:none;z-index:0;
}

/* page background */
.scrap-page[data-bg="cream"] { background:var(--cream); }
.scrap-page[data-bg="rose"] { background:linear-gradient(145deg,#fdf0f2 0%,#fce4ec 100%); }
.scrap-page[data-bg="sage"] { background:linear-gradient(145deg,#f0f5f0 0%,#e0ecdf 100%); }
.scrap-page[data-bg="sky"] { background:linear-gradient(145deg,#f0f6fc 0%,#ddeef8 100%); }
.scrap-page[data-bg="lavender"] { background:linear-gradient(145deg,#f5f0fc 0%,#ede0f8 100%); }
.scrap-page[data-bg="warm"] { background:linear-gradient(145deg,#fdf8ed 0%,#f5e8cc 100%); }
.scrap-page[data-bg="dark"] { background:linear-gradient(145deg,#1e1620 0%,#2a1828 100%); }

/* page title */
.page-title-bar {
  position:absolute;top:0;left:0;right:0;
  padding:10px 16px 6px;
  border-bottom:1px solid rgba(184,145,90,0.25);
  display:flex;align-items:center;gap:8px;
  z-index:5;
  background:inherit;
}
.page-title-input {
  font-family:'Dancing Script',cursive;
  font-size:1.15rem;
  color:var(--rose-d);
  border:none;background:transparent;outline:none;
  flex:1;
}
.page-title-input::placeholder { color:var(--ink-ll);opacity:0.5; }
.page-bg-btn {
  font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink-ll);cursor:pointer;padding:3px 8px;
  border:1px solid var(--gold-l);border-radius:20px;
  background:transparent;font-family:'Lato',sans-serif;
  transition:all 0.2s;
}
.page-bg-btn:hover { background:var(--gold-l);color:var(--gold-d); }
.delete-page-btn {
  font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;
  color:#c97b84;cursor:pointer;padding:3px 8px;
  border:1px solid var(--rose-l);border-radius:20px;
  background:transparent;font-family:'Lato',sans-serif;
  transition:all 0.2s;
}
.delete-page-btn:hover { background:var(--rose-l); }

/* canvas area */
.page-canvas {
  position:absolute;
  top:42px;left:0;right:0;bottom:0;
  overflow:hidden;
}

/* ─── DECORATIONS (SVG elements on canvas) ─── */
.deco {
  position:absolute;
  cursor:grab;
  user-select:none;
  touch-action:none;
  transform-origin:center center;
}
.deco:active{cursor:grabbing;}
.deco.sel { outline:1.5px dashed var(--rose);outline-offset:4px; }
.deco .del-btn {
  position:absolute;top:-9px;right:-9px;
  width:20px;height:20px;border-radius:50%;
  background:var(--rose);color:#fff;border:none;
  font-size:0.75rem;line-height:20px;text-align:center;
  cursor:pointer;display:none;z-index:10;
}
.deco.sel .del-btn { display:block; }
.deco .rot-btn {
  position:absolute;bottom:-9px;left:-9px;
  width:20px;height:20px;border-radius:50%;
  background:var(--gold);color:#fff;border:none;
  font-size:0.75rem;line-height:20px;text-align:center;
  cursor:grab;display:none;z-index:10;
}
.deco.sel .rot-btn { display:block; }
.deco .scale-btn {
  position:absolute;bottom:-9px;right:-9px;
  width:20px;height:20px;border-radius:50%;
  background:var(--sage);color:#fff;border:none;
  font-size:0.75rem;line-height:20px;text-align:center;
  cursor:se-resize;display:none;z-index:10;
}
.deco.sel .scale-btn { display:block; }

/* Photo polaroid */
.deco-photo {
  background:#fff;
  padding:10px 10px 34px;
  box-shadow:2px 4px 14px var(--sh),0 1px 3px rgba(0,0,0,0.06);
}
.deco-photo img { width:100%;height:150px;object-fit:cover;display:block; }
.deco-photo .photo-caption {
  font-family:'Dancing Script',cursive;
  font-size:0.88rem;color:var(--ink-l);
  text-align:center;margin-top:6px;
  outline:none;min-height:20px;
}

/* Note */
.deco-note {
  padding:16px 18px;
  box-shadow:2px 4px 14px var(--sh);
  min-width:150px;
}
.deco-note .note-body {
  font-family:'EB Garamond',serif;
  font-size:0.95rem;font-style:italic;
  color:var(--ink);outline:none;min-height:48px;
  line-height:1.7;white-space:pre-wrap;
}
.deco-note .note-date {
  font-size:0.65rem;color:var(--ink-ll);
  margin-top:10px;letter-spacing:0.1em;text-transform:uppercase;
  font-family:'Lato',sans-serif;font-weight:300;
}

/* SVG deco element */
.deco-svg svg { display:block; }

/* Label */
.deco-label {
  font-family:'Dancing Script',cursive;
  font-size:1.3rem;
  outline:none;white-space:nowrap;
  padding:4px 8px;
  min-width:60px;
}

/* ─── TOOLBAR (bottom of right page) ─── */
#toolbar {
  position:fixed;
  bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  padding:10px 16px;
  background:rgba(26,14,8,0.85);
  backdrop-filter:blur(12px);
  border-radius:50px;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  z-index:200;
  transition:opacity 0.3s;
}
#toolbar.hidden { opacity:0;pointer-events:none; }
.tbtn {
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:30px;
  border:1px solid rgba(255,255,255,0.15);
  background:transparent;color:rgba(255,255,255,0.8);
  font-family:'Lato',sans-serif;font-size:0.75rem;
  letter-spacing:0.06em;text-transform:uppercase;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.tbtn:hover { background:rgba(201,123,132,0.35);border-color:var(--rose-l);color:#fff; }
.tbtn.act { background:var(--rose);border-color:var(--rose);color:#fff; }

/* ─── MODALS ─── */
.overlay {
  position:fixed;inset:0;
  background:rgba(26,14,8,0.6);
  backdrop-filter:blur(6px);
  z-index:500;display:flex;align-items:center;justify-content:center;
  padding:20px;animation:fi 0.2s ease;
}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
.modal {
  background:var(--cream);
  border-radius:4px;
  padding:32px;max-width:460px;width:100%;
  box-shadow:0 24px 64px rgba(0,0,0,0.4);
  animation:su 0.22s ease;
  position:relative;
}
@keyframes su{from{transform:translateY(18px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal h2 {
  font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-style:italic;
  color:var(--rose-d);margin-bottom:20px;
}
.modal label {
  display:block;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--ink-l);margin-bottom:5px;font-family:'Lato',sans-serif;
}
.modal input[type=text],.modal textarea,.modal select {
  width:100%;padding:9px 12px;
  border:1.5px solid var(--gold-l);border-radius:3px;
  background:#fff;font-family:'EB Garamond',serif;font-size:1rem;
  color:var(--ink);margin-bottom:14px;outline:none;
  transition:border-color 0.2s;
}
.modal input:focus,.modal textarea:focus { border-color:var(--rose-l); }
.modal textarea{resize:vertical;min-height:80px;}
.mclose {
  position:absolute;top:12px;right:14px;background:none;border:none;
  font-size:1.2rem;cursor:pointer;color:var(--ink-ll);
  transition:color 0.2s;
}
.mclose:hover{color:var(--rose);}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.mbtn{
  padding:8px 18px;border-radius:30px;border:1.5px solid var(--rose-l);
  background:#fff;color:var(--rose-d);font-family:'Lato',sans-serif;
  font-size:0.8rem;letter-spacing:0.06em;text-transform:uppercase;
  cursor:pointer;transition:all 0.2s;
}
.mbtn:hover,.mbtn.pri{background:var(--rose);color:#fff;border-color:var(--rose);}
.mbtn.pri:hover{background:var(--rose-d);}

/* Color swatches */
.swatch-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s;}
.swatch:hover,.swatch.on{transform:scale(1.2);border-color:var(--ink);}

/* Deco grid */
.deco-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-height:280px;overflow-y:auto;margin-bottom:14px;}
.deco-thumb{
  border:1.5px solid var(--gold-l);border-radius:4px;
  padding:10px 6px;cursor:pointer;text-align:center;
  background:#fff;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.deco-thumb:hover,.deco-thumb.on{border-color:var(--rose);background:var(--rose-l);}
.deco-thumb svg{pointer-events:none;}
.deco-thumb span{font-size:0.65rem;color:var(--ink-ll);font-family:'Lato',sans-serif;letter-spacing:0.06em;text-transform:uppercase;}

/* Upload area */
.upload-zone{
  border:2px dashed var(--gold-l);border-radius:4px;padding:22px;
  text-align:center;cursor:pointer;margin-bottom:14px;
  transition:all 0.2s;color:var(--ink-ll);font-size:0.88rem;
}
.upload-zone:hover{border-color:var(--rose-l);background:rgba(201,123,132,0.04);}
.upload-zone .uz-icon{font-size:2rem;display:block;margin-bottom:6px;}
#fileIn{display:none;}

/* Toast */
#toast{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--ink);color:#fff;padding:8px 20px;border-radius:30px;
  font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;
  font-family:'Lato',sans-serif;opacity:0;transition:all 0.3s;z-index:1000;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Cover intro */
#coverScreen {
  position:fixed;inset:0;z-index:300;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%,#3a2018,#1a0e08 60%,#0d0805);
}
#bookCover {
  width:min(440px,90vw);
  background:linear-gradient(135deg,var(--cover-l),var(--cover-d));
  border-radius:6px 2px 2px 6px;
  padding:60px 40px;
  text-align:center;
  box-shadow:-12px 0 0 #3d1018, -14px 0 30px rgba(0,0,0,0.5),
             0 30px 80px rgba(0,0,0,0.7);
  position:relative;
  cursor:pointer;
  transition:transform 0.4s ease, box-shadow 0.4s ease;
  overflow:hidden;
}
#bookCover::before {
  content:'';position:absolute;inset:16px;
  border:1.5px solid rgba(255,255,255,0.2);border-radius:2px;pointer-events:none;
}
#bookCover::after {
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
  pointer-events:none;
}
#bookCover:hover { transform:translateX(8px) rotate(0.5deg); box-shadow:-18px 0 0 #3d1018, -20px 0 40px rgba(0,0,0,0.6), 0 40px 100px rgba(0,0,0,0.8); }
.bc-rose { position:absolute;top:12px;right:12px;opacity:0.25; }
.bc-rose2 { position:absolute;bottom:12px;left:12px;opacity:0.2;transform:rotate(180deg) scaleX(-1); }
.bc-title {
  font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,5vw,2.8rem);
  font-style:italic;font-weight:600;color:rgba(255,255,255,0.92);
  line-height:1.2;margin-bottom:8px;text-shadow:0 2px 16px rgba(0,0,0,0.4);
  position:relative;z-index:1;
}
.bc-heart{color:var(--rose-l);font-size:1.6rem;display:block;margin:8px 0;position:relative;z-index:1;animation:pulse 2.5s ease-in-out infinite;}
.bc-sub{font-family:'Dancing Script',cursive;color:rgba(255,255,255,0.5);font-size:1rem;position:relative;z-index:1;}
.bc-hint{
  margin-top:32px;font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(255,255,255,0.3);font-family:'Lato',sans-serif;position:relative;z-index:1;
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:0.3;}50%{opacity:0.7;}}

/* BG chooser in modal */
.bg-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.bg-swatch{width:44px;height:34px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:transform 0.15s;}
.bg-swatch:hover,.bg-swatch.on{transform:scale(1.15);border-color:var(--ink);}

/* Empty page hint */
.page-empty-hint {
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;pointer-events:none;opacity:0.35;
}
.page-empty-hint svg { opacity:0.5; }
.page-empty-hint p { font-family:'Dancing Script',cursive;font-size:1.1rem;color:var(--ink-l); }
</style>
</head>
<body>

<!-- ── COVER SCREEN ── -->
<div id="coverScreen">
  <div id="bookCover" onclick="openBook()">
    <svg class="bc-rose" width="100" height="100" viewBox="0 0 100 100"><use href="#svgRose"/></svg>
    <svg class="bc-rose2" width="80" height="80" viewBox="0 0 100 100"><use href="#svgRose"/></svg>
    <div class="bc-title">Our Book<br>of Memories</div>
    <span class="bc-heart">♡</span>
    <div class="bc-sub">a scrapbook for two</div>
    <div class="bc-hint">Open the book</div>
  </div>
</div>

<!-- ── BOOK ── -->
<div id="bookWrap" style="display:none;">
  <div id="book">
    <!-- Left page (decorative) -->
    <div id="cover">
      <svg class="cover-rose" width="130" height="130" viewBox="0 0 100 100"><use href="#svgRose"/></svg>
      <svg class="cover-rose-tl" width="90" height="90" viewBox="0 0 100 100"><use href="#svgRose"/></svg>
      <div class="cover-title">Our Book<br>of Memories</div>
      <span class="cover-heart">♡</span>
      <div class="cover-subtitle">a scrapbook for two</div>
      <div class="cover-open-hint">← our story</div>
    </div>

    <!-- Right pages -->
    <div id="pagesArea">
      <div id="pageTabs">
        <div class="page-tab add-tab" onclick="addPage()" title="Add page">+</div>
      </div>
      <!-- pages injected here -->
      <div id="noPageMsg" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;opacity:0.5;padding:30px;text-align:center;">
        <svg width="60" height="60" viewBox="0 0 100 100" style="opacity:0.4"><use href="#svgRose"/></svg>

  buildNoteSwatches();

// ── COVER OPEN ──
function openBook(){
  document.getElementById('coverScreen').style.display='none';
  document.getElementById('bookWrap').style.display='flex';
  if(pages.length>0) switchPage(pages[0].id);
  updateToolbar();
}

// ── PAGE MANAGEMENT ──
function addPage(){
  const id = Date.now();
  const page = {id, title:'', bg:'cream', items:[]};
  pages.push(page);
  renderPage(page);
  switchPage(id);
  updateNoPageMsg();
  scheduleSave();
}

function renderPage(page){
  const area = document.getElementById('pagesArea');

  // Tab
  const tabsEl = document.getElementById('pageTabs');
  const addTab = tabsEl.querySelector('.add-tab');
  const tab = document.createElement('div');
  tab.className='page-tab';
  tab.dataset.pid = page.id;
  tab.textContent = page.title || '✦';
  tab.onclick = ()=> switchPage(page.id);
  tabsEl.insertBefore(tab, addTab);

  // Page div
  const pg = document.createElement('div');
  pg.className='scrap-page';
  pg.dataset.pid = page.id;
  pg.dataset.bg = page.bg;

  // Title bar
  const bar = document.createElement('div');
  bar.className='page-title-bar';
  const inp = document.createElement('input');
  inp.type='text'; inp.className='page-title-input';
  inp.placeholder='Name this page…'; inp.value=page.title||'';
  inp.maxLength=40;
  inp.addEventListener('input',e=>{
    page.title=e.target.value;
    tab.textContent=page.title||'✦';
    scheduleSave();
  });
  const bgBtn = document.createElement('button');
  bgBtn.className='page-bg-btn'; bgBtn.textContent='Background';
  bgBtn.onclick=()=>{ activePgId=page.id; openM('bgM'); };
  const delBtn = document.createElement('button');
  delBtn.className='delete-page-btn'; delBtn.textContent='Delete page';
  delBtn.onclick=()=>deletePage(page.id);
  bar.appendChild(inp); bar.appendChild(bgBtn); bar.appendChild(delBtn);

  // Canvas
  const canvas = document.createElement('div');
  canvas.className='page-canvas';
  canvas.dataset.pid = page.id;

  // Empty hint
  const hint = document.createElement('div');
  hint.className='page-empty-hint';
  hint.innerHTML=`<svg width="60" height="60" viewBox="0 0 100 100"><use href="#svgRose"/></svg><p>Use the toolbar to decorate this page</p>`;
  canvas.appendChild(hint);

  pg.appendChild(bar);
  pg.appendChild(canvas);
  area.insertBefore(pg, document.getElementById('noPageMsg'));

  // Render existing items
  page.items.forEach(item=> renderItem(item, canvas, page));
}

function switchPage(id){
  activePgId = id;
  document.querySelectorAll('.scrap-page').forEach(p=>p.classList.toggle('active', p.dataset.pid==id));
  document.querySelectorAll('.page-tab:not(.add-tab)').forEach(t=>t.classList.toggle('active', t.dataset.pid==id));
  updateToolbar();
  updateNoPageMsg();
  clearSel();
}

function deletePage(id){
  if(!confirm('Delete this page?')) return;
  pages = pages.filter(p=>p.id!=id);
  document.querySelectorAll(`[data-pid="${id}"]`).forEach(e=>e.remove());
  if(pages.length>0){ switchPage(pages[0].id); }
  else { activePgId=null; updateToolbar(); updateNoPageMsg(); }
  scheduleSave();
}

function updateNoPageMsg(){
  const msg = document.getElementById('noPageMsg');
  if(msg) msg.style.display = pages.length===0?'flex':'none';
}

function updateToolbar(){
  document.getElementById('toolbar').classList.toggle('hidden', !activePgId);
}

function getActivePage(){ return pages.find(p=>p.id==activePgId); }
function getActiveCanvas(){ return document.querySelector(`.page-canvas[data-pid="${activePgId}"]`); }

function updateEmptyHint(canvas){
  const hint = canvas.querySelector('.page-empty-hint');
  if(!hint) return;
  const hasItems = canvas.querySelectorAll('.deco').length > 0;
  hint.style.display = hasItems ? 'none' : 'flex';
}

// ── PLACE ITEMS ──
function rndPos(canvas){
  const w=canvas.offsetWidth||380, h=canvas.offsetHeight||540;
  return {x:30+Math.random()*(w-180), y:30+Math.random()*(h-180)};
}

function placePhoto(){
  if(!pendingPhoto){ alert('Choose a photo first.'); return; }
  const pg = getActivePage(); if(!pg) return;
  const canvas = getActiveCanvas();
  const pos = rndPos(canvas);
  const item = {id:Date.now(), type:'photo', src:pendingPhoto, caption:document.getElementById('pCaption').value||'',
                 x:pos.x, y:pos.y, rot:-2+Math.random()*4, w:180};
  pg.items.push(item);
  renderItem(item, canvas, pg);
  updateEmptyHint(canvas);
  pendingPhoto=null; document.getElementById('pCaption').value='';
  document.getElementById('fileIn').value='';
  closeM('photoM'); scheduleSave();
}

function placeNote(){
  const txt = document.getElementById('noteText').value.trim();
  if(!txt){ alert('Write something!'); return; }
  const pg = getActivePage(); if(!pg) return;
  const canvas = getActiveCanvas();
  const pos = rndPos(canvas);
  const c = NOTE_COLS[noteColorI];
  const item = {id:Date.now(), type:'note', text:txt, bg:c.bg, accent:c.accent, border:c.border,
                 x:pos.x, y:pos.y, rot:-2+Math.random()*4,
                 date:new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})};
  pg.items.push(item);
  renderItem(item, canvas, pg);
  updateEmptyHint(canvas);
  document.getElementById('noteText').value='';
  closeM('noteM'); scheduleSave();
}

function placeDeco(){
  if(!selectedDecoKey){ alert('Choose a decoration!'); return; }
  const pg = getActivePage(); if(!pg) return;
  const canvas = getActiveCanvas();
  const pos = rndPos(canvas);
  const def = DECOS.find(d=>d.key===selectedDecoKey);
  const item = {id:Date.now(), type:'deco', key:selectedDecoKey,
                 x:pos.x, y:pos.y, rot:-5+Math.random()*10, w:def.w, h:def.h};
  pg.items.push(item);
  renderItem(item, canvas, pg);
  updateEmptyHint(canvas);
  closeM('decoM'); scheduleSave();
}

function placeLabel(){
  const txt = document.getElementById('labelTxt').value.trim();
  if(!txt){ alert('Enter label text!'); return; }
  const pg = getActivePage(); if(!pg) return;
  const canvas = getActiveCanvas();
  const pos = rndPos(canvas);
  const item = {id:Date.now(), type:'label', text:txt, color:LABEL_COLS[labelColorI],
                 x:pos.x, y:pos.y, rot:-3+Math.random()*6, size:1.3};
  pg.items.push(item);
  renderItem(item, canvas, pg);
  updateEmptyHint(canvas);
  document.getElementById('labelTxt').value='';
  closeM('labelM'); scheduleSave();
}

// ── RENDER ITEM ──
function renderItem(item, canvas, page){
  const el = document.createElement('div');
  el.className='deco';
  el.dataset.iid = item.id;
  el.style.cssText=`left:${item.x}px;top:${item.y}px;transform:rotate(${item.rot||0}deg);`;

  let inner='';

  if(item.type==='photo'){
    el.classList.add('deco-photo');
    el.style.width=(item.w||180)+'px';
    inner=`<img src="${item.src}" alt="memory"/>
      <div class="photo-caption" contenteditable="true" data-field="caption">${esc(item.caption)}</div>`;
  } else if(item.type==='note'){
    el.classList.add('deco-note');
    el.style.background=item.bg;
    el.style.borderLeft=`4px solid ${item.accent}`;
    el.style.width=`${item.w||170}px`;
    inner=`<div class="note-body" contenteditable="true" data-field="text">${esc(item.text)}</div>
      <div class="note-date">${item.date||''}</div>`;
  } else if(item.type==='deco'){
    el.classList.add('deco-svg');
    const def = DECOS.find(d=>d.key===item.key);
    if(def){
      inner=`<svg width="${item.w||def.w}" height="${item.h||def.h}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><use href="#${def.svg}"/></svg>`;
    }
  } else if(item.type==='label'){
    el.classList.add('deco-label');
    el.style.color=item.color;
    el.style.fontSize=(item.size||1.3)+'rem';
    inner=`<span contenteditable="true" data-field="text">${esc(item.text)}</span>`;
  }

  // Controls
  inner += `<button class="del-btn" title="Remove">×</button>
             <button class="rot-btn" title="Rotate">↺</button>
             <button class="scale-btn" title="Resize">⤡</button>`;
  el.innerHTML = inner;

  // Events
  el.addEventListener('mousedown', e=>{
    if(['del-btn','rot-btn','scale-btn'].some(c=>e.target.classList.contains(c))) return;
    if(e.target.hasAttribute('contenteditable')) return;
    e.preventDefault();
    selectDeco(el, item, page);
    startDrag(e, el, item, canvas);
  });
  el.addEventListener('touchstart', e=>{
    if(e.target.classList.contains('del-btn')) return;
    selectDeco(el, item, page);
    startDragTouch(e, el, item, canvas);
  },{passive:true});
  el.querySelector('.del-btn').addEventListener('click', e=>{
    e.stopPropagation();
    page.items = page.items.filter(i=>i.id!==item.id);
    el.remove();
    updateEmptyHint(canvas);
    scheduleSave();
  });
  el.querySelector('.rot-btn').addEventListener('mousedown', e=>{ e.stopPropagation(); startRotate(e,el,item); });
  el.querySelector('.scale-btn').addEventListener('mousedown', e=>{ e.stopPropagation(); startScale(e,el,item); });

  el.querySelectorAll('[contenteditable]').forEach(ce=>{
    ce.addEventListener('input',()=>{ item[ce.dataset.field]=ce.textContent; scheduleSave(); });
    ce.addEventListener('mousedown',e=>e.stopPropagation());
  });

  canvas.appendChild(el);
}

// ── SELECTION ──
function selectDeco(el, item, page){
  clearSel();
  sel={el,item,page};
  el.classList.add('sel');
}
function clearSel(){
  if(sel){ sel.el.classList.remove('sel'); }
  sel=null;
}
document.addEventListener('mousedown',e=>{
  if(!e.target.closest('.deco') && !e.target.closest('.modal') && !e.target.closest('#toolbar')) clearSel();
});
document.addEventListener('keydown',e=>{
  if((e.key==='Delete'||e.key==='Backspace') && sel && e.target===document.body){
    sel.page.items = sel.page.items.filter(i=>i.id!==sel.item.id);
    sel.el.remove();
    const canvas = getActiveCanvas();
    if(canvas) updateEmptyHint(canvas);
    sel=null; scheduleSave();
  }
});

// ── DRAG ──
function startDrag(e, el, item, canvas){
  const startX=e.clientX, startY=e.clientY;
  const sx=item.x, sy=item.y;
  const mm=e2=>{
    item.x=Math.max(0,sx+(e2.clientX-startX));
    item.y=Math.max(0,sy+(e2.clientY-startY));
    el.style.left=item.x+'px'; el.style.top=item.y+'px';
  };
  const mu=()=>{ scheduleSave(); window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); };
  window.addEventListener('mousemove',mm);
  window.addEventListener('mouseup',mu);
}
function startDragTouch(e, el, item){
  const t=e.touches[0]; const sx=item.x,sy=item.y,stx=t.clientX,sty=t.clientY;
  const tm=e2=>{ const t2=e2.touches[0]; item.x=Math.max(0,sx+(t2.clientX-stx)); item.y=Math.max(0,sy+(t2.clientY-sty)); el.style.left=item.x+'px'; el.style.top=item.y+'px'; };
  const te=()=>{ scheduleSave(); el.removeEventListener('touchmove',tm); el.removeEventListener('touchend',te); };
  el.addEventListener('touchmove',tm,{passive:true}); el.addEventListener('touchend',te);
}

// ── ROTATE ──
function startRotate(e, el, item){
  e.preventDefault();
  const rect = el.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const startAngle=Math.atan2(e.clientY-cy, e.clientX-cx)*(180/Math.PI)-item.rot;
  const mm=e2=>{
    const ang=Math.atan2(e2.clientY-cy,e2.clientX-cx)*(180/Math.PI)-startAngle;
    item.rot=ang;
    el.style.transform=`rotate(${ang}deg)`;
  };
  const mu=()=>{ scheduleSave(); window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); };
  window.addEventListener('mousemove',mm); window.addEventListener('mouseup',mu);
}

// ── SCALE ──
function startScale(e, el, item){
  e.preventDefault();
  const startX=e.clientX, startW=item.w||el.offsetWidth;
  const mm=e2=>{
    const nw=Math.max(50,startW+(e2.clientX-startX));
    item.w=nw; el.style.width=nw+'px';
    if(item.type==='deco'){ const svg=el.querySelector('svg'); if(svg){ svg.setAttribute('width',nw); item.h=nw; svg.setAttribute('height',nw); } }
    if(item.type==='label'){ item.size=Math.max(0.7,nw/100); el.querySelector('span').style.fontSize=item.size+'rem'; }
  };
  const mu=()=>{ scheduleSave(); window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); };
  window.addEventListener('mousemove',mm); window.addEventListener('mouseup',mu);
}

// ── BG CHANGE ──
function setPageBg(pgId, bgKey){
  const pg=pages.find(p=>p.id==pgId); if(!pg) return;
  pg.bg=bgKey;
  const el=document.querySelector(`.scrap-page[data-pid="${pgId}"]`);
  if(el){ el.dataset.bg=bgKey; }
  scheduleSave();
}

// ── BUILD UI ──
function buildNoteSwatches(){
  const row=document.getElementById('noteSwatches');
  NOTE_COLS.forEach((c,i)=>{
    const s=document.createElement('div');
    s.className='swatch'+(i===0?' on':'');
    s.style.background=c.bg; s.style.borderColor=c.accent;
    s.onclick=()=>{ row.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on')); s.classList.add('on'); noteColorI=i; };
    row.appendChild(s);
  });
}
function buildLabelSwatches(){
  const row=document.getElementById('labelSwatches');
  LABEL_COLS.forEach((c,i)=>{
    const s=document.createElement('div');
    s.className='swatch'+(i===0?' on':'');
    s.style.background=c;
    s.onclick=()=>{ row.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on')); s.classList.add('on'); labelColorI=i; };
    row.appendChild(s);
  });
}
function buildDecoGrid(){
  const grid=document.getElementById('decoGrid');
  DECOS.forEach(d=>{
    const cell=document.createElement('div');
    cell.className='deco-thumb';
    cell.dataset.key=d.key;
    cell.innerHTML=`<svg width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><use href="#${d.svg}"/></svg><span>${d.label}</span>`;
    cell.onclick=()=>{
      grid.querySelectorAll('.deco-thumb').forEach(x=>x.classList.remove('on'));
      cell.classList.add('on'); selectedDecoKey=d.key;
    };
    grid.appendChild(cell);
  });
}
function buildBgGrid(){
  const row=document.getElementById('bgGrid');
  BG_LIST.forEach(b=>{
    const s=document.createElement('div');
    s.className='bg-swatch'; s.style.background=b.color; s.title=b.label;
    s.onclick=()=>{ row.querySelectorAll('.bg-swatch').forEach(x=>x.classList.remove('on')); s.classList.add('on'); setPageBg(activePgId,b.key); };
    row.appendChild(s);
  });
}

// ── MODALS ──
function openM(id){ document.getElementById(id).style.display='flex'; }
function closeM(id){ document.getElementById(id).style.display='none'; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.querySelectorAll('.overlay').forEach(o=>o.style.display='none'); });

// ── FILE ──
function handleFile(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{ pendingPhoto=ev.target.result; };
  r.readAsDataURL(f);
}

// ── SAVE / LOAD ──
let saveT=null;
function scheduleSave(){ clearTimeout(saveT); saveT=setTimeout(saveAll,700); }
function saveAll(){
  try{
    localStorage.setItem('mem_book_pages', JSON.stringify(pages));
    showToast('✓ Saved');
  }catch(e){
    showToast('⚠ Storage full — remove some photos');
  }
}
function load(){
  try{
    const raw=localStorage.getItem('mem_book_pages');
    if(!raw) return;
    pages=JSON.parse(raw);
    pages.forEach(p=>renderPage(p));
    if(pages.length>0 && activePgId) switchPage(pages[0].id);
    updateNoPageMsg();
  }catch(e){ console.warn('Load error',e); }
}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
