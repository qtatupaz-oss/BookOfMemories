<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Book of Memories</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=EB+Garamond:ital,wght@0,400;1,400&family=Dancing+Script:wght@500;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#fdf8f0;--parchment:#f5e9d0;--paper:#fffdf7;
  --rose:#c97b84;--rose-l:#f2d0d4;--rose-d:#7a3d44;
  --gold:#b8915a;--gold-l:#e8d5a3;--gold-d:#7a5a2a;
  --ink:#2a1f1a;--ink-l:#6b4f45;--ink-ll:#a08070;
  --sage:#7a9e7e;
  --cover-l:#8e4a52;--cover-d:#5a1f28;
  --spine:#6b3038;
  --sh:rgba(42,31,26,0.13);

  /* Book dimensions — single source of truth */
  --book-w: min(920px, 96vw);
  --book-h: min(640px, 90vh);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Lato',sans-serif;
  background:radial-gradient(ellipse at 30% 20%,#3a2018 0%,#1a0e08 60%,#0d0805 100%);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
}

/* ── BOOK SHELL ── */
/* The book is ALWAYS in the DOM at its full size. The cover screen overlays it. */
#book{
  position:relative;
  width:var(--book-w);
  height:var(--book-h);
  display:flex;
  flex-shrink:0;
  filter:drop-shadow(0 36px 72px rgba(0,0,0,0.68));
}
/* spine shadow strip */
#book::before{
  content:'';position:absolute;
  left:calc(50% - 13px);width:26px;height:100%;
  background:linear-gradient(180deg,var(--spine) 0%,#3a1218 45%,var(--spine) 100%);
  box-shadow:inset -3px 0 8px rgba(0,0,0,0.45),inset 3px 0 8px rgba(0,0,0,0.45);
  z-index:50;pointer-events:none;
}

/* ── LEFT PAGE (decorative cover) ── */
#leftPage{
  width:50%;height:100%;flex-shrink:0;
  background:linear-gradient(135deg,var(--cover-l),var(--cover-d));
  border-radius:4px 0 0 4px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  position:relative;overflow:hidden;
}
#leftPage::before{content:'';position:absolute;inset:12px;border:1.5px solid rgba(255,255,255,0.18);border-radius:2px;pointer-events:none;}
.lp-rose{position:absolute;opacity:0.2;pointer-events:none;}
.lp-rose.tr{top:16px;right:16px;}
.lp-rose.bl{bottom:16px;left:16px;transform:rotate(180deg) scaleX(-1);}
.lp-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,2.5vw,2rem);font-style:italic;font-weight:600;color:rgba(255,255,255,0.9);text-align:center;line-height:1.25;z-index:1;padding:0 20px;text-shadow:0 2px 12px rgba(0,0,0,0.4);}
.lp-heart{color:var(--rose-l);font-size:1.3rem;z-index:1;animation:hpulse 2.5s ease-in-out infinite;}
@keyframes hpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
.lp-sub{font-family:'Dancing Script',cursive;color:rgba(255,255,255,0.42);font-size:0.9rem;z-index:1;}

/* ── COVER OVERLAY ── */
/* Sits on top of the whole book at z-index 100. Dismissed on click. */
#coverOverlay{
  position:absolute;inset:0;
  z-index:100;
  border-radius:4px;
  cursor:pointer;
  /* Fades out when .dismissed is added */
  transition:opacity 0.5s ease, visibility 0.5s ease;
  opacity:1;visibility:visible;
}
#coverOverlay.dismissed{opacity:0;visibility:hidden;pointer-events:none;}

/* The overlay shows a full-book-sized cover illustration */
#coverOverlay .co-left{
  position:absolute;left:0;top:0;width:50%;height:100%;
  background:linear-gradient(135deg,var(--cover-l),var(--cover-d));
  border-radius:4px 0 0 4px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  overflow:hidden;
}
#coverOverlay .co-left::before{content:'';position:absolute;inset:12px;border:1.5px solid rgba(255,255,255,0.2);border-radius:2px;pointer-events:none;}
#coverOverlay .co-right{
  position:absolute;right:0;top:0;width:50%;height:100%;
  background:linear-gradient(160deg,#4a2020,#2e1010);
  border-radius:0 4px 4px 0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
}
.co-hint{font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.32);font-family:'Lato',sans-serif;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:0.32;}50%{opacity:0.72;}}
.co-open-text{font-family:'Dancing Script',cursive;color:rgba(255,255,255,0.5);font-size:1.1rem;}

/* ── RIGHT PAGE ── */
#rightPage{
  width:50%;height:100%;flex-shrink:0;
  background:var(--paper);
  border-radius:0 4px 4px 0;
  position:relative;
  overflow:hidden;
  box-shadow:inset -5px 0 18px rgba(0,0,0,0.07),inset 5px 0 10px rgba(0,0,0,0.05);
}
/* ruled lines */
#rightPage::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(transparent,transparent 27px,rgba(184,145,90,0.07) 28px);
  pointer-events:none;z-index:0;
}

/* ── TABS COLUMN ── */
#tabsCol{
  position:absolute;top:0;right:0;bottom:0;width:34px;
  display:flex;flex-direction:column;
  z-index:20;
  border-left:1px solid rgba(184,145,90,0.22);
  background:rgba(250,242,228,0.7);
}
#tabsList{
  flex:1;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;
}
#tabsList::-webkit-scrollbar{width:2px;}
#tabsList::-webkit-scrollbar-thumb{background:var(--rose-l);}
.ptab{
  writing-mode:vertical-rl;
  font-family:'Dancing Script',cursive;
  font-size:0.62rem;color:var(--ink-ll);
  padding:8px 3px;min-height:44px;max-height:80px;
  cursor:pointer;flex-shrink:0;
  border-bottom:1px solid rgba(184,145,90,0.15);
  transition:background 0.15s,color 0.15s;
  text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.ptab:hover{background:var(--rose-l);color:var(--rose-d);}
.ptab.active{background:var(--rose-l);color:var(--rose-d);border-left:2px solid var(--rose);}
#addTabBtn{
  height:40px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;line-height:1;
  cursor:pointer;
  color:var(--gold-d);
  background:rgba(184,145,90,0.12);
  border-top:1px solid var(--gold-l);
  transition:background 0.15s,color 0.15s;
  user-select:none;
}
#addTabBtn:hover{background:var(--gold-l);color:var(--gold-d);}

/* ── PAGE HOST ── */
/* Contains all .spage elements and the no-pages message */
#pageHost{
  position:absolute;
  top:0;left:0;right:34px;bottom:0; /* leaves room for tabs */
  overflow:hidden;
}
.spage{
  position:absolute;inset:0;
  display:none;  /* hidden until .active */
}
.spage.active{display:block;}

/* page backgrounds */
.spage[data-bg="cream"]{background:#fdf8f0;}
.spage[data-bg="rose"]{background:linear-gradient(145deg,#fdf0f2,#fce4ec);}
.spage[data-bg="sage"]{background:linear-gradient(145deg,#f0f5f0,#dde8dc);}
.spage[data-bg="sky"]{background:linear-gradient(145deg,#f0f6fc,#ddeef8);}
.spage[data-bg="lavender"]{background:linear-gradient(145deg,#f5f0fc,#ede0f8);}
.spage[data-bg="warm"]{background:linear-gradient(145deg,#fdf8ed,#f5e8cc);}
.spage[data-bg="dark"]{background:linear-gradient(145deg,#1e1620,#2a1828);}

/* no pages message — inside pageHost, pointer-events:none so tabs show through */
#noPageMsg{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:24px;text-align:center;
  opacity:0.42;pointer-events:none; /* let clicks pass to tabs */
}
#noPageMsg p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--ink-l);}

/* page title bar */
.pbar{
  position:absolute;top:0;left:0;right:0;height:40px;
  display:flex;align-items:center;gap:6px;padding:0 10px;
  border-bottom:1px solid rgba(184,145,90,0.2);
  background:inherit;z-index:5;
}
.ptitle{
  flex:1;font-family:'Dancing Script',cursive;font-size:1.05rem;
  color:var(--rose-d);border:none;background:transparent;outline:none;min-width:0;
}
.ptitle::placeholder{color:var(--ink-ll);opacity:0.4;}
.pbarbtn{
  font-size:0.62rem;letter-spacing:0.07em;text-transform:uppercase;
  padding:3px 7px;border-radius:14px;cursor:pointer;white-space:nowrap;
  font-family:'Lato',sans-serif;transition:all 0.15s;
  border:1px solid var(--gold-l);color:var(--ink-ll);background:transparent;
}
.pbarbtn:hover{background:var(--gold-l);color:var(--gold-d);}
.pbarbtn.del{border-color:var(--rose-l);color:var(--rose);}
.pbarbtn.del:hover{background:var(--rose-l);}

/* page canvas */
.pcanvas{
  position:absolute;top:40px;left:0;right:0;bottom:0;
  overflow:hidden;
}

/* empty page hint */
.pempty{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;pointer-events:none;opacity:0.3;
}
.pempty p{font-family:'Dancing Script',cursive;font-size:0.95rem;color:var(--ink-l);}

/* ── DECORATIONS ── */
.deco{
  position:absolute;cursor:grab;user-select:none;touch-action:none;
  transform-origin:center center;
}
.deco:active{cursor:grabbing;}
.deco.sel{outline:1.5px dashed var(--rose);outline-offset:5px;}
.deco .xbtn,.deco .rbtn,.deco .sbtn{
  position:absolute;width:20px;height:20px;border-radius:50%;
  font-size:0.68rem;line-height:20px;text-align:center;
  border:none;display:none;z-index:20;color:#fff;cursor:pointer;
}
.deco.sel .xbtn,.deco.sel .rbtn,.deco.sel .sbtn{display:block;}
.deco .xbtn{top:-9px;right:-9px;background:var(--rose);}
.deco .rbtn{bottom:-9px;left:-9px;background:var(--gold);cursor:grab;}
.deco .sbtn{bottom:-9px;right:-9px;background:var(--sage);cursor:se-resize;}

.deco-photo{background:#fff;padding:9px 9px 32px;box-shadow:2px 4px 14px var(--sh);}
.deco-photo img{width:100%;height:150px;object-fit:cover;display:block;}
.deco-photo .pcap{font-family:'Dancing Script',cursive;font-size:0.85rem;color:var(--ink-l);text-align:center;margin-top:5px;outline:none;min-height:18px;}

.deco-note{padding:14px 16px;box-shadow:2px 4px 14px var(--sh);min-width:140px;}
.deco-note .nbody{font-family:'EB Garamond',serif;font-size:0.9rem;font-style:italic;color:var(--ink);outline:none;min-height:44px;line-height:1.65;white-space:pre-wrap;}
.deco-note .ndate{font-size:0.62rem;color:var(--ink-ll);margin-top:8px;letter-spacing:0.08em;text-transform:uppercase;font-family:'Lato',sans-serif;}

.deco-svg svg{display:block;}
.deco-label{font-family:'Dancing Script',cursive;outline:none;white-space:nowrap;padding:3px 6px;}

/* ── TOOLBAR ── */
#toolbar{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  display:none;gap:7px;flex-wrap:wrap;justify-content:center;
  padding:9px 16px;
  background:rgba(20,10,5,0.9);backdrop-filter:blur(14px);
  border-radius:50px;border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:200;
}
#toolbar.vis{display:flex;}
.tbtn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 13px;border-radius:28px;
  border:1px solid rgba(255,255,255,0.14);
  background:transparent;color:rgba(255,255,255,0.78);
  font-family:'Lato',sans-serif;font-size:0.73rem;
  letter-spacing:0.06em;text-transform:uppercase;
  cursor:pointer;transition:all 0.18s;white-space:nowrap;
}
.tbtn:hover{background:rgba(201,123,132,0.35);border-color:var(--rose-l);color:#fff;}

/* ── MODALS ── */
.overlay{
  position:fixed;inset:0;background:rgba(22,12,6,0.62);
  backdrop-filter:blur(6px);z-index:500;
  display:none;align-items:center;justify-content:center;padding:20px;
}
.overlay.vis{display:flex;}
.modal{
  background:var(--cream);border-radius:4px;padding:28px 30px;
  max-width:450px;width:100%;
  box-shadow:0 22px 60px rgba(0,0,0,0.45);
  position:relative;animation:msu 0.2s ease;
}
@keyframes msu{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-style:italic;color:var(--rose-d);margin-bottom:18px;}
.modal label{display:block;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-l);margin-bottom:4px;}
.modal input[type=text],.modal textarea{
  width:100%;padding:8px 11px;
  border:1.5px solid var(--gold-l);border-radius:3px;
  background:#fff;font-family:'EB Garamond',serif;font-size:0.97rem;color:var(--ink);
  margin-bottom:13px;outline:none;transition:border-color 0.18s;
}
.modal input:focus,.modal textarea:focus{border-color:var(--rose-l);}
.modal textarea{resize:vertical;min-height:76px;}
.mclose{position:absolute;top:10px;right:14px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--ink-ll);transition:color 0.18s;}
.mclose:hover{color:var(--rose);}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px;}
.mbtn{padding:7px 16px;border-radius:28px;border:1.5px solid var(--rose-l);background:#fff;color:var(--rose-d);font-family:'Lato',sans-serif;font-size:0.75rem;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 0.18s;}
.mbtn:hover,.mbtn.pri{background:var(--rose);color:#fff;border-color:var(--rose);}
.mbtn.pri:hover{background:var(--rose-d);}

.sw-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px;}
.sw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.14s;}
.sw:hover,.sw.on{transform:scale(1.22);border-color:var(--ink);}

.deco-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-height:270px;overflow-y:auto;margin-bottom:13px;}
.dthumb{border:1.5px solid var(--gold-l);border-radius:4px;padding:8px 4px;cursor:pointer;text-align:center;background:#fff;transition:all 0.18s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.dthumb:hover,.dthumb.on{border-color:var(--rose);background:var(--rose-l);}
.dthumb svg{pointer-events:none;}
.dthumb span{font-size:0.58rem;color:var(--ink-ll);font-family:'Lato',sans-serif;letter-spacing:0.05em;text-transform:uppercase;}

.upload-zone{border:2px dashed var(--gold-l);border-radius:4px;padding:20px;text-align:center;cursor:pointer;margin-bottom:13px;transition:all 0.18s;color:var(--ink-ll);font-size:0.86rem;}
.upload-zone:hover{border-color:var(--rose-l);background:rgba(201,123,132,0.04);}
.uico{font-size:1.8rem;display:block;margin-bottom:5px;}
#fileIn{display:none;}

.bg-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px;}
.bgopt{width:42px;height:32px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:transform 0.14s;}
.bgopt:hover,.bgopt.on{transform:scale(1.12);border-color:var(--ink);}

/* toast */
#toast{
  position:fixed;bottom:66px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--ink);color:#fff;padding:7px 18px;border-radius:28px;
  font-size:0.74rem;letter-spacing:0.08em;text-transform:uppercase;
  font-family:'Lato',sans-serif;opacity:0;transition:all 0.28s;z-index:1000;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="book">

  <!-- LEFT PAGE: static decorative cover -->
  <div id="leftPage">
    <svg class="lp-rose tr" width="110" height="110" viewBox="0 0 100 100"><use href="#svgRose"/></svg>
    <svg class="lp-rose bl" width="80" height="80" viewBox="0 0 100 100"><use href="#svgRose"/></svg>
    <div class="lp-title">Our Book<br>of Memories</div>
    <span class="lp-heart">♡</span>
    <div class="lp-sub">a scrapbook for two</div>
  </div>

  <!-- RIGHT PAGE: tabs + page host -->
  <div id="rightPage">

    <!-- Page host: all pages live here, bounded to exclude tabs -->
    <div id="pageHost">

      <!-- No-pages message: pointer-events:none so tabs are clickable through it -->
      <div id="noPageMsg">
        <svg width="50" height="50" viewBox="0 0 100 100" style="opacity:0.5"><use href="#svgRose"/></svg>
        <p>Click <strong style="color:var(--gold)">+</strong> on the right edge<br>to add your first page</p>
      </div>

    </div><!-- /pageHost -->

    <!-- Tabs column: OUTSIDE pageHost so it's never obscured -->
    <div id="tabsCol">
      <div id="tabsList"></div>
      <div id="addTabBtn" onclick="addPage()" title="Add new page">+</div>
    </div>

  </div><!-- /rightPage -->

  <!-- COVER OVERLAY: sits on top of the full book, click to dismiss -->
  <div id="coverOverlay" onclick="openBook()">
    <div class="co-left">
      <svg style="position:absolute;top:14px;right:14px;opacity:0.22;pointer-events:none" width="100" height="100" viewBox="0 0 100 100"><use href="#svgRose"/></svg>
      <svg style="position:absolute;bottom:14px;left:14px;opacity:0.18;transform:rotate(180deg) scaleX(-1);pointer-events:none" width="80" height="80" viewBox="0 0 100 100"><use href="#svgRose"/></svg>
      <div style="font-family:'Cormorant Garamond',serif;font-size:clamp(1.3rem,2.6vw,2.1rem);font-style:italic;font-weight:600;color:rgba(255,255,255,0.92);text-align:center;line-height:1.25;z-index:1;padding:0 22px;text-shadow:0 2px 12px rgba(0,0,0,0.4);">Our Book<br>of Memories</div>
      <span style="color:#f2d0d4;font-size:1.3rem;z-index:1;animation:hpulse 2.5s ease-in-out infinite;">♡</span>
      <div style="font-family:'Dancing Script',cursive;color:rgba(255,255,255,0.4);font-size:0.9rem;z-index:1;">a scrapbook for two</div>
    </div>
    <div class="co-right">
      <div class="co-open-text">Open the book</div>
      <div class="co-hint">tap anywhere to begin</div>
    </div>
  </div>

</div><!-- /book -->

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tbtn" onclick="openM('mPhoto')">📷 Photo</button>
  <button class="tbtn" onclick="openM('mNote')">✏️ Note</button>
  <button class="tbtn" onclick="openM('mDeco')">🎨 Decorate</button>
  <button class="tbtn" onclick="openM('mLabel')">🏷 Label</button>
  <button class="tbtn" onclick="saveAll()">💾 Save</button>
</div>

<!-- MODALS -->
<div id="mPhoto" class="overlay">
<div class="modal">
  <button class="mclose" onclick="closeM('mPhoto')">×</button>
  <h2>Add a Photo</h2>
  <div class="upload-zone" onclick="document.getElementById('fileIn').click()">
    <span class="uico">🖼️</span>Click to choose a photo from your device
  </div>
  <input type="file" id="fileIn" accept="image/*" onchange="handleFile(event)"/>
  <label>Caption (optional)</label>
  <input type="text" id="pCap" placeholder="A wonderful memory…"/>
  <div class="mactions">
    <button class="mbtn" onclick="closeM('mPhoto')">Cancel</button>
    <button class="mbtn pri" onclick="placePhoto()">Add to Page</button>
  </div>
</div></div>

<div id="mNote" class="overlay">
<div class="modal">
  <button class="mclose" onclick="closeM('mNote')">×</button>
  <h2>Write a Note</h2>
  <label>Your message</label>
  <textarea id="noteTxt" placeholder="Remember when we…"></textarea>
  <label>Paper color</label>
  <div class="sw-row" id="noteColors"></div>
  <div class="mactions">
    <button class="mbtn" onclick="closeM('mNote')">Cancel</button>
    <button class="mbtn pri" onclick="placeNote()">Add to Page</button>
  </div>
</div></div>

<div id="mDeco" class="overlay">
<div class="modal">
  <button class="mclose" onclick="closeM('mDeco')">×</button>
  <h2>Add a Decoration</h2>
  <div class="deco-grid" id="decoGrid"></div>
  <div class="mactions">
    <button class="mbtn" onclick="closeM('mDeco')">Cancel</button>
    <button class="mbtn pri" onclick="placeDeco()">Add to Page</button>
  </div>
</div></div>

<div id="mLabel" class="overlay">
<div class="modal">
  <button class="mclose" onclick="closeM('mLabel')">×</button>
  <h2>Add a Label</h2>
  <label>Text</label>
  <input type="text" id="labelTxt" placeholder="Summer 2024 ♡"/>
  <label>Color</label>
  <div class="sw-row" id="labelColors"></div>
  <div class="mactions">
    <button class="mbtn" onclick="closeM('mLabel')">Cancel</button>
    <button class="mbtn pri" onclick="placeLabel()">Add Label</button>
  </div>
</div></div>

<div id="mBg" class="overlay">
<div class="modal">
  <button class="mclose" onclick="closeM('mBg')">×</button>
  <h2>Page Background</h2>

<script>
// ── STATE ──
let pages = [];
let activePid = null;
let pendingPhoto = null;
let noteColI = 0;
let labelColI = 0;
let selDecoKey = null;
let curBgPid = null;
let selEl = null, selItem = null, selPage = null;

const NOTE_COLS = [
  {bg:'#fff9e6',accent:'#c9a84c'},{bg:'#fce8ec',accent:'#c97b84'},
  {bg:'#eaf3ea',accent:'#7a9e7e'},{bg:'#e8f0fa',accent:'#5b8db8'},
  {bg:'#f3eaf8',accent:'#9c6fb6'},{bg:'#fff3e0',accent:'#d4845a'},
];
const LABEL_COLS = ['#7a3d44','#b8915a','#7a9e7e','#5b8db8','#9c6fb6','#d4845a','#2a1f1a'];
const BG_LIST = [
  {k:'cream',c:'#fdf8f0'},{k:'rose',c:'#fce4ec'},{k:'sage',c:'#dde8dc'},
  {k:'sky',c:'#ddeef8'},{k:'lavender',c:'#ede0f8'},{k:'warm',c:'#f5e8cc'},{k:'dark',c:'#2a1828'},
];
const DECOS = [
  {k:'rose',   l:'Rose',       svg:'svgRose',     w:80, h:80},
  {k:'daisy',  l:'Daisy',      svg:'svgDaisy',    w:80, h:80},
  {k:'lavender',l:'Lavender',  svg:'svgLavender', w:70, h:100},
  {k:'bow',    l:'Ribbon Bow', svg:'svgBow',      w:100,h:80},
  {k:'blossom',l:'Blossom',    svg:'svgBlossom',  w:100,h:100},
  {k:'tape',   l:'Washi Tape', svg:'svgTape',     w:120,h:50},
  {k:'corner', l:'Flourish',   svg:'svgCorner',   w:80, h:80},
  {k:'garland',l:'Garland',    svg:'svgGarland',  w:120,h:80},
  {k:'butterfly',l:'Butterfly',svg:'svgButterfly',w:90, h:70},
  {k:'leaf',   l:'Leaf Sprig', svg:'svgLeaf',     w:70, h:100},
  {k:'stars',  l:'Stars',      svg:'svgStars',    w:90, h:80},
  {k:'camera', l:'Camera',     svg:'svgCamera',   w:80, h:80},
];

// ── BOOT ──
window.addEventListener('DOMContentLoaded', () => {
  buildNoteColors();
  buildLabelColors();
  buildDecoGrid();
  buildBgRow();
  load();
  // Close modals on overlay click
  document.querySelectorAll('.overlay').forEach(ov =>
    ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('vis'); })
  );
});

// ── OPEN BOOK (dismiss cover overlay) ──
function openBook() {
  document.getElementById('coverOverlay').classList.add('dismissed');
  if (pages.length > 0) switchPage(pages[0].id);
  refreshToolbar();
}

// ── ADD PAGE ──
function addPage() {
  const id = 'p' + Date.now();
  const page = { id, title: '', bg: 'cream', items: [] };
  pages.push(page);
  _renderPage(page);
  switchPage(id);
  saveAll();
}

function _renderPage(page) {
  // ── Tab ──
  const tab = document.createElement('div');
  tab.className = 'ptab';
  tab.id = 'tab_' + page.id;
  tab.textContent = page.title || '✦';
  tab.addEventListener('click', () => switchPage(page.id));
  document.getElementById('tabsList').appendChild(tab);

  // ── Page element ──
  const pg = document.createElement('div');
  pg.className = 'spage';
  pg.id = 'pg_' + page.id;
  pg.dataset.bg = page.bg;

  // Title bar
  const bar = document.createElement('div');
  bar.className = 'pbar';

  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'ptitle';
  inp.placeholder = 'Name this page…'; inp.value = page.title || ''; inp.maxLength = 40;
  inp.addEventListener('input', e => {
    page.title = e.target.value;
    tab.textContent = page.title || '✦';
    saveAll();
  });

  const bgBtn = document.createElement('button');
  bgBtn.className = 'pbarbtn'; bgBtn.textContent = 'Background';
  bgBtn.onclick = () => { curBgPid = page.id; openM('mBg'); };

  const delBtn = document.createElement('button');
  delBtn.className = 'pbarbtn del'; delBtn.textContent = 'Delete';
  delBtn.onclick = () => deletePage(page.id);

  bar.appendChild(inp); bar.appendChild(bgBtn); bar.appendChild(delBtn);

  // Canvas
  const canvas = document.createElement('div');
  canvas.className = 'pcanvas';
  canvas.id = 'canvas_' + page.id;

  const hint = document.createElement('div');
  hint.className = 'pempty';
  hint.innerHTML = '<svg width="48" height="48" viewBox="0 0 100 100"><use href="#svgRose"/></svg><p>Use the toolbar to decorate</p>';
  canvas.appendChild(hint);

  pg.appendChild(bar);
  pg.appendChild(canvas);
  document.getElementById('pageHost').appendChild(pg);

  // Render existing items
  (page.items || []).forEach(item => _renderItem(item, canvas, page));
}

function switchPage(id) {
  activePid = id;
  document.querySelectorAll('.spage').forEach(p =>
    p.classList.toggle('active', p.id === 'pg_' + id)
  );
  document.querySelectorAll('.ptab').forEach(t =>
    t.classList.toggle('active', t.id === 'tab_' + id)
  );
  refreshNoPageMsg();
  refreshToolbar();
  clearSel();
}

function deletePage(id) {
  if (!confirm('Delete this page?')) return;
  pages = pages.filter(p => p.id !== id);
  document.getElementById('pg_' + id)?.remove();
  document.getElementById('tab_' + id)?.remove();
  activePid = pages.length > 0 ? pages[0].id : null;
  if (activePid) switchPage(activePid);
  else { refreshNoPageMsg(); refreshToolbar(); }
  saveAll();
}

function refreshNoPageMsg() {
  document.getElementById('noPageMsg').style.display = pages.length === 0 ? 'flex' : 'none';
}
function refreshToolbar() {
  document.getElementById('toolbar').classList.toggle('vis', !!activePid);
}
function getPage() { return pages.find(p => p.id === activePid); }
function getCanvas() { return document.getElementById('canvas_' + activePid); }
function refreshHint(canvas) {
  const h = canvas.querySelector('.pempty'); if (!h) return;
  h.style.display = canvas.querySelectorAll('.deco').length ? 'none' : 'flex';
}

// ── PLACE ITEMS ──
function rndPos(canvas) {
  const w = canvas.offsetWidth || 340, h = canvas.offsetHeight || 500;
  return { x: 20 + Math.random() * (w - 200), y: 20 + Math.random() * (h - 200) };
}
function rndRot(r) { return (Math.random() * r * 2 - r); }

function placePhoto() {
  if (!pendingPhoto) { toast('Choose a photo first!'); return; }
  const pg = getPage(); if (!pg) return;
  const canvas = getCanvas();
  const pos = rndPos(canvas);
  const item = {
    id: 'i' + Date.now(), type: 'photo', src: pendingPhoto,
    caption: document.getElementById('pCap').value || '',
    x: pos.x, y: pos.y, rot: rndRot(3), w: 180
  };
  pg.items.push(item);
  _renderItem(item, canvas, pg);
  refreshHint(canvas);
  pendingPhoto = null;
  document.getElementById('pCap').value = '';
  document.getElementById('fileIn').value = '';
  closeM('mPhoto'); saveAll();
}

function placeNote() {
  const txt = document.getElementById('noteTxt').value.trim();
  if (!txt) { toast('Write something!'); return; }
  const pg = getPage(); if (!pg) return;
  const canvas = getCanvas();
  const pos = rndPos(canvas);
  const c = NOTE_COLS[noteColI];
  const item = {
    id: 'i' + Date.now(), type: 'note', text: txt,
    bg: c.bg, accent: c.accent,
    x: pos.x, y: pos.y, rot: rndRot(3), w: 170,
    date: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
  };
  pg.items.push(item);
  _renderItem(item, canvas, pg);
  refreshHint(canvas);
  document.getElementById('noteTxt').value = '';
  closeM('mNote'); saveAll();
}

function placeDeco() {
  if (!selDecoKey) { toast('Pick a decoration!'); return; }
  const pg = getPage(); if (!pg) return;
  const canvas = getCanvas();
  const pos = rndPos(canvas);
  const def = DECOS.find(d => d.k === selDecoKey);
  const item = {
    id: 'i' + Date.now(), type: 'deco', key: selDecoKey,
    x: pos.x, y: pos.y, rot: rndRot(8), w: def.w, h: def.h
  };
  pg.items.push(item);
  _renderItem(item, canvas, pg);
  refreshHint(canvas);
  closeM('mDeco'); saveAll();
}

function placeLabel() {
  const txt = document.getElementById('labelTxt').value.trim();
  if (!txt) { toast('Enter label text!'); return; }
  const pg = getPage(); if (!pg) return;
  const canvas = getCanvas();
  const pos = rndPos(canvas);
  const item = {
    id: 'i' + Date.now(), type: 'label', text: txt,
    color: LABEL_COLS[labelColI], x: pos.x, y: pos.y, rot: rndRot(5), fs: 1.3
  };
  pg.items.push(item);
  _renderItem(item, canvas, pg);
  refreshHint(canvas);
  document.getElementById('labelTxt').value = '';
  closeM('mLabel'); saveAll();
}

// ── RENDER ITEM ──
function _renderItem(item, canvas, page) {
  const el = document.createElement('div');
  el.className = 'deco';
  el.id = 'el_' + item.id;
  el.style.left = item.x + 'px';
  el.style.top = item.y + 'px';
  el.style.transform = 'rotate(' + (item.rot || 0) + 'deg)';

  if (item.type === 'photo') {
    el.classList.add('deco-photo');
    el.style.width = (item.w || 180) + 'px';
    const img = document.createElement('img'); img.src = item.src; img.alt = '';
    const cap = document.createElement('div');
    cap.className = 'pcap'; cap.contentEditable = 'true'; cap.dataset.f = 'caption';
    cap.textContent = item.caption || '';
    el.appendChild(img); el.appendChild(cap);
  } else if (item.type === 'note') {
    el.classList.add('deco-note');
    el.style.cssText += ';background:' + item.bg + ';border-left:4px solid ' + item.accent + ';width:' + (item.w || 170) + 'px';
    const body = document.createElement('div');
    body.className = 'nbody'; body.contentEditable = 'true'; body.dataset.f = 'text';
    body.textContent = item.text || '';
    const date = document.createElement('div');
    date.className = 'ndate'; date.textContent = item.date || '';
    el.appendChild(body); el.appendChild(date);
  } else if (item.type === 'deco') {
    el.classList.add('deco-svg');
    const def = DECOS.find(d => d.k === item.key);
    if (def) {
      const ns = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('width', item.w || def.w);
      svg.setAttribute('height', item.h || def.h);
      svg.setAttribute('viewBox', '0 0 100 100');
      const use = document.createElementNS(ns, 'use');
      use.setAttribute('href', '#' + def.svg);
      svg.appendChild(use); el.appendChild(svg);
    }
  } else if (item.type === 'label') {
    el.classList.add('deco-label');
    el.style.color = item.color;
    el.style.fontSize = (item.fs || 1.3) + 'rem';
    const span = document.createElement('span');
    span.contentEditable = 'true'; span.dataset.f = 'text'; span.textContent = item.text || '';
    el.appendChild(span);
  }

  // Control buttons
  const xb = document.createElement('button'); xb.className = 'xbtn'; xb.textContent = '×';
  xb.addEventListener('click', e => { e.stopPropagation(); removeItem(item, page, canvas); });
  const rb = document.createElement('button'); rb.className = 'rbtn'; rb.textContent = '↺';
  rb.addEventListener('mousedown', e => { e.stopPropagation(); e.preventDefault(); startRotate(e, el, item); });
  const sb = document.createElement('button'); sb.className = 'sbtn'; sb.textContent = '⤡';
  sb.addEventListener('mousedown', e => { e.stopPropagation(); e.preventDefault(); startScale(e, el, item); });
  el.appendChild(xb); el.appendChild(rb); el.appendChild(sb);

  // Contenteditable sync
  el.querySelectorAll('[contenteditable]').forEach(ce => {
    ce.addEventListener('input', () => { item[ce.dataset.f] = ce.textContent; saveAll(); });
    ce.addEventListener('mousedown', e => e.stopPropagation());
    ce.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
  });

  // Drag + select
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('xbtn') || e.target.classList.contains('rbtn') ||
        e.target.classList.contains('sbtn') || e.target.hasAttribute('contenteditable')) return;
    e.preventDefault();
    selectEl(el, item, page);
    startDrag(e, el, item);
  });
  el.addEventListener('touchstart', e => {
    if (e.target.classList.contains('xbtn') || e.target.hasAttribute('contenteditable')) return;
    selectEl(el, item, page);
    startDragTouch(e, el, item);
  }, { passive: true });

  canvas.appendChild(el);
}

function removeItem(item, page, canvas) {
  page.items = page.items.filter(i => i.id !== item.id);
  document.getElementById('el_' + item.id)?.remove();
  refreshHint(canvas);
  saveAll();
}

// ── SELECTION ──
function selectEl(el, item, page) {
  clearSel();
  selEl = el; selItem = item; selPage = page;
  el.classList.add('sel');
}
function clearSel() {
  selEl?.classList.remove('sel');
  selEl = null; selItem = null; selPage = null;
}
document.addEventListener('mousedown', e => {
  if (!e.target.closest('.deco') && !e.target.closest('.overlay') && !e.target.closest('#toolbar'))
    clearSel();
});
document.addEventListener('keydown', e => {
  if ((e.key === 'Delete' || e.key === 'Backspace') && selItem && e.target === document.body) {
    removeItem(selItem, selPage, getCanvas()); clearSel();
  }
});

// ── DRAG ──
function startDrag(e, el, item) {
  const sx = e.clientX, sy = e.clientY, ix = item.x, iy = item.y;
  el.style.zIndex = 99;
  const mm = e2 => {
    item.x = Math.max(0, ix + (e2.clientX - sx));
    item.y = Math.max(0, iy + (e2.clientY - sy));
    el.style.left = item.x + 'px'; el.style.top = item.y + 'px';
  };
  const mu = () => { el.style.zIndex = ''; saveAll(); window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); };
  window.addEventListener('mousemove', mm); window.addEventListener('mouseup', mu);
}
function startDragTouch(e, el, item) {
  const t = e.touches[0], sx = t.clientX, sy = t.clientY, ix = item.x, iy = item.y;
  const tm = e2 => { const t2 = e2.touches[0]; item.x = Math.max(0, ix + (t2.clientX - sx)); item.y = Math.max(0, iy + (t2.clientY - sy)); el.style.left = item.x + 'px'; el.style.top = item.y + 'px'; };
  const te = () => { saveAll(); el.removeEventListener('touchmove', tm); el.removeEventListener('touchend', te); };
  el.addEventListener('touchmove', tm, { passive: true }); el.addEventListener('touchend', te);
}

// ── ROTATE ──
function startRotate(e, el, item) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
  const base = Math.atan2(e.clientY - cy, e.clientX - cx) * (180 / Math.PI) - (item.rot || 0);
  const mm = e2 => {
    item.rot = Math.atan2(e2.clientY - cy, e2.clientX - cx) * (180 / Math.PI) - base;
    el.style.transform = 'rotate(' + item.rot + 'deg)';
  };
  const mu = () => { saveAll(); window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); };
  window.addEventListener('mousemove', mm); window.addEventListener('mouseup', mu);
}

// ── SCALE ──
function startScale(e, el, item) {
  const sx = e.clientX, sw = item.w || el.offsetWidth;
  const mm = e2 => {
    const nw = Math.max(50, sw + (e2.clientX - sx));
    item.w = nw; el.style.width = nw + 'px';
    if (item.type === 'deco') {
      const svg = el.querySelector('svg');
      if (svg) { svg.setAttribute('width', nw); svg.setAttribute('height', nw); item.h = nw; }
    }
    if (item.type === 'label') { item.fs = Math.max(0.6, nw / 100); el.style.fontSize = item.fs + 'rem'; }
  };
  const mu = () => { saveAll(); window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); };
  window.addEventListener('mousemove', mm); window.addEventListener('mouseup', mu);
}

// ── BG ──
function setPageBg(pid, bgk) {
  const pg = pages.find(p => p.id === pid); if (!pg) return;
  pg.bg = bgk;
  const el = document.getElementById('pg_' + pid); if (el) el.dataset.bg = bgk;
  saveAll();
}

// ── BUILD UI ──
function buildNoteColors() {
  const row = document.getElementById('noteColors');
  NOTE_COLS.forEach((c, i) => {
    const s = mkSw(c.bg, i === 0, () => { row.querySelectorAll('.sw').forEach(x => x.classList.remove('on')); s.classList.add('on'); noteColI = i; });
    s.style.border = '2px solid ' + c.accent; row.appendChild(s);
  });
}
function buildLabelColors() {
  const row = document.getElementById('labelColors');
  LABEL_COLS.forEach((c, i) => {
    const s = mkSw(c, i === 0, () => { row.querySelectorAll('.sw').forEach(x => x.classList.remove('on')); s.classList.add('on'); labelColI = i; });
    row.appendChild(s);
  });
}
function mkSw(color, active, onclick) {
  const s = document.createElement('div');
  s.className = 'sw' + (active ? ' on' : ''); s.style.background = color;
  s.addEventListener('click', onclick); return s;
}
function buildDecoGrid() {
  const grid = document.getElementById('decoGrid');
  DECOS.forEach(d => {
    const cell = document.createElement('div'); cell.className = 'dthumb';
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('width', '58'); svg.setAttribute('height', '58'); svg.setAttribute('viewBox', '0 0 100 100');
    const use = document.createElementNS(ns, 'use'); use.setAttribute('href', '#' + d.svg);
    svg.appendChild(use);
    const lbl = document.createElement('span'); lbl.textContent = d.l;
    cell.appendChild(svg); cell.appendChild(lbl);
    cell.addEventListener('click', () => { grid.querySelectorAll('.dthumb').forEach(x => x.classList.remove('on')); cell.classList.add('on'); selDecoKey = d.k; });
    grid.appendChild(cell);
  });
}
function buildBgRow() {
  const row = document.getElementById('bgRow');
  BG_LIST.forEach(b => {
    const s = document.createElement('div'); s.className = 'bgopt'; s.style.background = b.c; s.title = b.k;
    s.addEventListener('click', () => { row.querySelectorAll('.bgopt').forEach(x => x.classList.remove('on')); s.classList.add('on'); setPageBg(curBgPid, b.k); });
    row.appendChild(s);
  });
}

// ── MODALS ──
function openM(id) { document.getElementById(id).classList.add('vis'); }
function closeM(id) { document.getElementById(id).classList.remove('vis'); }
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.overlay.vis').forEach(o => o.classList.remove('vis'));
});

// ── FILE ──
function handleFile(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { pendingPhoto = ev.target.result; toast('Photo ready — click Add to Page'); };
  r.readAsDataURL(f);
}

// ── SAVE / LOAD ──
let saveTimer = null;
function saveAll() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem('mbk_v3', JSON.stringify(pages));
      toast('✓ Saved');
    } catch (e) { toast('⚠ Storage full — try smaller photos'); }
  }, 600);
}
function load() {
  try {
    const raw = localStorage.getItem('mbk_v3');
    if (!raw) return;
    pages = JSON.parse(raw);
    pages.forEach(p => _renderPage(p));
    if (pages.length > 0) {
      // Auto-dismiss cover if we have saved pages
      document.getElementById('coverOverlay').classList.add('dismissed');
      switchPage(pages[0].id);
    }
    refreshNoPageMsg();
  } catch (e) { console.warn('load error', e); }
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
